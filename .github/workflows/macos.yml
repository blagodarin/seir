name: macOS
on:
  push:
    paths-ignore:
      - '.clang-tidy'
      - 'docs'
      - 'LICENSE'
      - 'README.md'
jobs:
  build:
    name: Build
    runs-on: macos-26
    strategy:
      matrix:
        include:
          - renderer: Vulkan
            config: Release
          - renderer: Vulkan
            config: Debug
          - renderer:
            config: Debug
      fail-fast: false
    env:
      CMAKE_GENERATOR: Ninja
      CURL_SSL_BACKEND: SecureTransport # https://gitlab.kitware.com/cmake/cmake/-/issues/25522
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/build/_SeirDownloads
          key: macos-${{ hashFiles('cmake/SeirPackages/*.cmake') }}
      - name: Install prerequisites
        run: |
          brew install webp
      - name: Install Vulkan SDK
        if: matrix.renderer == 'Vulkan'
        run: |
          curl https://sdk.lunarg.com/sdk/download/1.4.341.1/mac/vulkansdk-macos-1.4.341.1.zip \
            --location \
            --output vulkansdk-macos-1.4.341.1.zip
          unzip vulkansdk-macos-1.4.341.1.zip
          ./vulkansdk-macOS-1.4.341.1.app/Contents/MacOS/vulkansdk-macOS-1.4.341.1 install \
            --accept-licenses \
            --confirm-command \
            --root "${{ github.workspace }}/VulkanSDK"
      - name: Run CMake
        run: |
          if [[ "${{ matrix.renderer }}" == "Vulkan" ]]; then
            . "${{ github.workspace }}/VulkanSDK/setup-env.sh"
          fi
          export CC=clang
          export CXX=clang++
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.config }} \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install" \
            -DSEIR_3RDPARTY_SKIP="freetype;jpeg;ogg;vorbis;webp;zlib;zstd" \
            -DSEIR_ALL=ON \
            -DSEIR_AUDIO_WAV=ON \
            -DSEIR_BENCHMARKS=ON \
            -DSEIR_COMPRESSION_ZLIB=ON \
            -DSEIR_COMPRESSION_ZSTD=ON \
            -DSEIR_EXAMPLES=ON \
            -DSEIR_IMAGE_BMP=ON \
            -DSEIR_IMAGE_DDS=ON \
            -DSEIR_IMAGE_ICO=ON \
            -DSEIR_IMAGE_JPEG=ON \
            -DSEIR_IMAGE_PNG=ON \
            -DSEIR_IMAGE_TGA=ON \
            -DSEIR_IMAGE_WEBP=ON \
            -DSEIR_RENDERER_BACKEND=${{ matrix.renderer }} \
            -DSEIR_TESTS=ON
      - name: Build
        run: |
          cmake --build build
      - name: Run tests
        run: |
          if [[ "${{ matrix.renderer }}" == "Vulkan" ]]; then
            . "${{ github.workspace }}/VulkanSDK/setup-env.sh"
          fi
          ctest --verbose --test-dir build
      - name: Build usage examples
        run: |
          export CC=clang
          export CXX=clang++
          cmake -S examples/usage/cmake_fetchcontent -B build.cmake_fetchcontent \
            -DCMAKE_BUILD_TYPE=${{ matrix.config }} \
            -DREPLACE_WITH_COMMIT_HASH=${{ github.sha }}
          cmake --build build.cmake_fetchcontent
          cmake --build build --target install
          cmake -S examples/usage/cmake_package -B build.cmake_package \
            -DCMAKE_BUILD_TYPE=${{ matrix.config }} \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/install"
          cmake --build build.cmake_package
